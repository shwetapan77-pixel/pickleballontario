<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Ontario Finder</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #b5f23d;
    --dark: #0d1117;
    --card: #161b22;
    --border: #21262d;
    --muted: #6e7681;
    --text: #e6edf3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(181,242,61,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(181,242,61,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 60px 24px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 52px;
  }

  .badge {
    display: inline-block;
    background: rgba(181,242,61,0.1);
    border: 1px solid rgba(181,242,61,0.3);
    color: var(--green);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 20px;
    margin-bottom: 20px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 9vw, 90px);
    line-height: 0.95;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }

  h1 span { color: var(--green); }

  .subtitle {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.6;
    max-width: 480px;
    margin: 0 auto;
  }

  /* Search panel */
  .search-panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 32px;
    position: relative;
    overflow: hidden;
  }

  .search-panel::before {
    content: '';
    position: absolute;
    top: -1px; left: 20px; right: 20px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.5;
  }

  .search-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    display: block;
  }

  .input-row {
    display: flex;
    gap: 12px;
    align-items: stretch;
  }

  textarea {
    flex: 1;
    background: var(--dark);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 14px 16px;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    min-height: 56px;
    max-height: 120px;
  }

  textarea:focus { border-color: rgba(181,242,61,0.5); }
  textarea::placeholder { color: var(--muted); }

  .search-btn {
    background: var(--green);
    color: var(--dark);
    border: none;
    border-radius: 10px;
    padding: 14px 24px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    min-width: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .search-btn:hover { background: #c8f755; transform: translateY(-1px); }
  .search-btn:active { transform: translateY(0); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Quick commands */
  .quick-cmds {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 14px;
  }

  .chip {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover { border-color: var(--green); color: var(--green); background: rgba(181,242,61,0.07); }

  /* Loading state */
  .loading {
    display: none;
    text-align: center;
    padding: 48px 24px;
    color: var(--muted);
  }

  .loading.active { display: block; }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  .results { display: none; }
  .results.active { display: block; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .results-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 1px;
  }

  .results-count {
    background: rgba(181,242,61,0.12);
    color: var(--green);
    border: 1px solid rgba(181,242,61,0.25);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
  }

  /* Rendered markdown output */
  .result-body {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    line-height: 1.75;
    font-size: 14.5px;
    color: #cdd5e0;
  }

  .result-body h2, .result-body h3 {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1px;
    color: var(--text);
    margin: 20px 0 10px;
    font-size: 22px;
  }

  .result-body h3 { font-size: 17px; color: var(--green); font-family: 'DM Sans', sans-serif; font-weight: 600; }

  .result-body p { margin-bottom: 10px; }

  .result-body ul, .result-body ol {
    padding-left: 20px;
    margin-bottom: 14px;
  }

  .result-body li { margin-bottom: 6px; }

  .result-body strong { color: var(--text); font-weight: 600; }

  .result-body a { color: var(--green); text-decoration: none; }
  .result-body a:hover { text-decoration: underline; }

  .result-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* Error */
  .error-box {
    display: none;
    background: rgba(248,81,73,0.08);
    border: 1px solid rgba(248,81,73,0.3);
    border-radius: 12px;
    padding: 20px 24px;
    color: #f85149;
    font-size: 14px;
  }
  .error-box.active { display: block; }

  /* Pickleball icon deco */
  .deco {
    position: fixed;
    bottom: -60px;
    right: -60px;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 1px solid rgba(181,242,61,0.06);
    pointer-events: none;
  }
  .deco::before {
    content: '🏓';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 80px;
    opacity: 0.05;
  }
</style>
</head>
<body>

<div class="deco"></div>

<div class="container">
  <header>
    <div class="badge">🏓 AI-Powered Search</div>
    <h1>PICKLEBALL<br><span>ONTARIO</span></h1>
    <p class="subtitle">Find players, clubs, leagues, and tournaments across Ontario using natural language commands.</p>
  </header>

  <div class="search-panel">
    <label class="search-label">Your Command</label>
    <div class="input-row">
      <textarea id="query" rows="2" placeholder="e.g. Find all pickleball players and clubs in Welland, Ontario…"></textarea>
      <button class="search-btn" id="searchBtn" onclick="search()">
        <span>FIND</span>
        <span>→</span>
      </button>
    </div>

    <div class="quick-cmds">
      <div class="chip" onclick="setQuery('Find pickleball clubs and leagues in Toronto Ontario')">🏙️ Toronto clubs</div>
      <div class="chip" onclick="setQuery('List pickleball players and tournaments in Ottawa Ontario')">🏛️ Ottawa players</div>
      <div class="chip" onclick="setQuery('Find pickleball courts and associations in Hamilton Ontario')">🎾 Hamilton courts</div>
      <div class="chip" onclick="setQuery('Show me pickleball communities in Niagara Region Ontario')">🍇 Niagara Region</div>
      <div class="chip" onclick="setQuery('Find all Ontario Pickleball Association members and events')">🍁 Province-wide</div>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Searching Ontario pickleball community…</p>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="results" id="results">
    <div class="results-header">
      <div class="results-title">RESULTS</div>
      <div class="results-count" id="resultsCount">Found via AI + Web Search</div>
    </div>
    <div class="result-body" id="resultBody"></div>
  </div>
</div>

<script>
  function setQuery(text) {
    document.getElementById('query').value = text;
    document.getElementById('query').focus();
  }

  // Allow Enter key (without Shift) to submit
  document.getElementById('query').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      search();
    }
  });

  function markdownToHtml(md) {
    return md
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h2>$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\[(.+?)\]\((https?:\/\/.+?)\)/g, '<a href="$2" target="_blank">$1</a>')
      .replace(/^---$/gm, '<hr>')
      .replace(/^- (.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, (m) => `<ul>${m}</ul>`)
      .replace(/\n\n/g, '</p><p>')
      .replace(/^(?!<[hul]|<li|<hr)(.+)$/gm, (m) => m.trim() ? m : '')
      .replace(/<p><\/p>/g, '')
      .replace(/\n/g, '<br>');
  }

  async function search() {
    const query = document.getElementById('query').value.trim();
    if (!query) return;

    const btn = document.getElementById('searchBtn');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const errorBox = document.getElementById('errorBox');

    btn.disabled = true;
    loading.classList.add('active');
    results.classList.remove('active');
    errorBox.classList.remove('active');

    try {
      const systemPrompt = `You are a helpful assistant that finds pickleball players, clubs, courts, leagues, associations, and tournaments in Ontario, Canada. 

When given a command:
1. Search the web to find real, current information
2. Return a well-organized list including:
   - Club/organization names
   - Locations (city, address if available)
   - Contact info or websites
   - Any notable players or events
3. Format your response with clear headings and bullet points
4. Always mention the Ontario Pickleball Association if relevant
5. Be thorough but concise

If searching a specific city, focus on that city and nearby areas.`;

      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: systemPrompt,
          tools: [{ type: "web_search_20250305", name: "web_search" }],
          messages: [{ role: "user", content: query + " (Focus on Ontario, Canada)" }]
        })
      });

      const data = await response.json();

      // Extract all text content blocks
      const textBlocks = data.content
        .filter(b => b.type === "text")
        .map(b => b.text)
        .join("\n\n");

      if (textBlocks) {
        document.getElementById('resultBody').innerHTML = markdownToHtml(textBlocks);
        document.getElementById('resultsCount').textContent = 'Powered by AI + Live Web Search';
        results.classList.add('active');
      } else {
        throw new Error("No results returned. Try rephrasing your query.");
      }

    } catch (err) {
      errorBox.textContent = "⚠️ " + (err.message || "Something went wrong. Please try again.");
      errorBox.classList.add('active');
    } finally {
      btn.disabled = false;
      loading.classList.remove('active');
    }
  }
</script>

</body>
</html>
